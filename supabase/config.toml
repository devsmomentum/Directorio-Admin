# Supabase project configuration
# Docs: https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

# ── Edge Functions ──────────────────────────────────────────────────────────────

# kill-switch: no requiere JWT porque lo llama pg_cron con x-cron-secret
[functions.kill-switch]
verify_jwt = false

# send-magic-link: la invoca el admin desde el panel; Supabase valida el JWT
# del caller y la function comprueba role='admin' adentro.
[functions.send-magic-link]
verify_jwt = true

# invite-store-staff: la invoca el DUEÑO desde /cliente/equipo. Supabase valida
# el JWT y la function comprueba que el caller es dueño de la tienda destino.
[functions.invite-store-staff]
verify_jwt = true

# send-contract-expiry-reminders: la llama pg_cron con x-cron-secret. Envía
# recordatorios por correo a clientes cuyo plan vence en 5/3/1/0 días.
[functions.send-contract-expiry-reminders]
verify_jwt = false

# send-whatsapp-expiry-reminders: la llama pg_cron con x-cron-secret. Envía
# recordatorios por WhatsApp (SuperAPI) a clientes cuyo plan vence en 5/3/1/0 días.
[functions.send-whatsapp-expiry-reminders]
verify_jwt = false
